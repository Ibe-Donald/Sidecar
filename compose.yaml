services:
  verve_sql_server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: verve_sql_server
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=StrongPassword@123
      - MSSQL_PID=Express
    ports:
      - "1435:1433"
    volumes:
      - ./init-db.sql:/init-db.sql
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'StrongPassword@123' -Q 'SELECT 1' -C -b"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    entrypoint:
      - /bin/bash
      - -c
      - |
        /opt/mssql/bin/sqlservr &
        SQL_PID=$!
        echo "Waiting for SQL Server..."
        until /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "StrongPassword@123" -Q "SELECT 1" -C -b > /dev/null 2>&1; do
          echo "Not ready yet, retrying..."
          sleep 3
        done
        sleep 3
        echo "Running init script..."
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "StrongPassword@123" -i /init-db.sql -C
        echo "Init complete."
        wait $$SQL_PID
volumes:

  sqlserver_data:
