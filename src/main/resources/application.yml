# src/main/resources/application.yml

server:
  port: 8080

spring:
  # 1. Database Connection
  datasource:

    url: jdbc:sqlserver://localhost:1435;databaseName=chibuikeDB;encrypt=true;trustServerCertificate=true
    username: sa
    password: StrongPassword@123
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  # 2. JPA & Hibernate Settings
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect

  # 3. Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # 4. Cache Configuration (For the Bonus Point)
  cache:
    type: simple

# 5. Custom Security Configuration
security:
  jwt:
    secret-key: b1750d0fa35e980ced166924f80c55f0500d812b43d14eded41c74cf082e2c20